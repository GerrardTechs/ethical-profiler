<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DB Viewer — EDFP Admin</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #1c2128; --border: #30363d;
    --accent: #58a6ff; --accent2: #388bfd; --text: #e6edf3; --muted: #8b949e;
    --danger: #f85149; --success: #3fb950; --warning: #d29922;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* Nav */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .nav-brand { display: flex; align-items: center; gap: .5rem; font-weight: 700; font-size: 1rem; color: var(--danger); text-decoration: none; }
  .nav-brand svg { width: 18px; height: 18px; fill: var(--danger); }
  .nav-links a { color: var(--muted); text-decoration: none; padding: .35rem .75rem; border-radius: 6px; font-size: .85rem; }
  .nav-links a:hover { background: var(--surface2); color: var(--text); }
  .btn-logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: .3rem .75rem; border-radius: 6px; cursor: pointer; font-size: .8rem; }
  .btn-logout:hover { border-color: var(--danger); color: var(--danger); }

  main { max-width: 1400px; margin: 0 auto; padding: 1.5rem; display: grid; grid-template-columns: 220px 1fr; gap: 1.25rem; }

  /* Sidebar */
  .sidebar { display: flex; flex-direction: column; gap: .5rem; }
  .sidebar-title { font-size: .72rem; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; padding: .5rem .75rem 0; }
  .table-btn { background: none; border: none; color: var(--muted); padding: .55rem .75rem; border-radius: 8px; cursor: pointer; font-size: .85rem; text-align: left; width: 100%; display: flex; align-items: center; justify-content: space-between; transition: background .12s, color .12s; }
  .table-btn:hover { background: var(--surface); color: var(--text); }
  .table-btn.active { background: var(--surface2); color: var(--accent); }
  .table-btn .count { font-size: .72rem; background: var(--surface2); color: var(--muted); padding: 1px 7px; border-radius: 20px; }
  .table-btn.active .count { background: #388bfd22; color: var(--accent); }

  .sidebar-sep { border: none; border-top: 1px solid var(--border); margin: .5rem 0; }

  /* Main content */
  .content { min-width: 0; }
  .content-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: .75rem; }
  .content-header h2 { font-size: 1.1rem; font-weight: 600; display: flex; align-items: center; gap: .5rem; }
  .badge-table { background: #388bfd22; color: var(--accent); border: 1px solid #388bfd44; border-radius: 20px; padding: 2px 10px; font-size: .75rem; font-weight: 500; font-family: monospace; }
  .actions { display: flex; gap: .5rem; align-items: center; flex-wrap: wrap; }
  .btn { padding: .4rem .9rem; border-radius: 7px; font-size: .82rem; cursor: pointer; display: flex; align-items: center; gap: .4rem; transition: all .12s; font-weight: 500; }
  .btn svg { width: 14px; height: 14px; fill: currentColor; }
  .btn-outline { background: none; border: 1px solid var(--border); color: var(--muted); }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
  .btn-danger { background: none; border: 1px solid var(--border); color: var(--muted); }
  .btn-danger:hover { border-color: var(--danger); color: var(--danger); }
  .btn-export { background: none; border: 1px solid var(--border); color: var(--muted); }
  .btn-export:hover { border-color: var(--success); color: var(--success); }
  .search-input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: .38rem .75rem; border-radius: 7px; font-size: .82rem; outline: none; width: 200px; }
  .search-input:focus { border-color: var(--accent); }

  /* Table */
  .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .table-scroll { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .8rem; white-space: nowrap; }
  thead { position: sticky; top: 0; z-index: 10; }
  th { background: var(--surface2); padding: .6rem 1rem; text-align: left; color: var(--muted); font-weight: 500; font-size: .72rem; text-transform: uppercase; letter-spacing: .04em; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
  th:hover { color: var(--text); }
  th.sorted { color: var(--accent); }
  td { padding: .6rem 1rem; border-bottom: 1px solid #21262d; max-width: 320px; overflow: hidden; text-overflow: ellipsis; vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .cell-null { color: var(--muted); font-style: italic; font-size: .75rem; }
  .cell-long { font-family: monospace; font-size: .75rem; color: var(--muted); cursor: pointer; }
  .cell-long:hover { color: var(--text); }

  /* Badges */
  .badge { display: inline-block; padding: 1px 8px; border-radius: 20px; font-size: .72rem; font-weight: 500; }
  .badge-admin    { background: #f8514920; color: var(--danger);  border: 1px solid #f8514940; }
  .badge-user     { background: #388bfd22; color: var(--accent);  border: 1px solid #388bfd40; }
  .badge-1        { background: #3fb95022; color: var(--success); border: 1px solid #3fb95040; }
  .badge-0        { background: #f8514920; color: var(--danger);  border: 1px solid #f8514940; }
  .badge-HIGH     { background: #f8514920; color: var(--danger);  border: 1px solid #f8514940; }
  .badge-MODERATE { background: #d2992220; color: var(--warning); border: 1px solid #d2992240; }
  .badge-LOW      { background: #3fb95020; color: var(--success); border: 1px solid #3fb95040; }

  /* Pagination */
  .pagination { display: flex; align-items: center; justify-content: space-between; padding: .75rem 1rem; border-top: 1px solid var(--border); font-size: .82rem; color: var(--muted); }
  .pag-btns { display: flex; gap: .4rem; }
  .pag-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: .3rem .65rem; border-radius: 6px; cursor: pointer; font-size: .8rem; }
  .pag-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .pag-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* Empty / loading states */
  .state-msg { text-align: center; padding: 4rem; color: var(--muted); font-size: .9rem; }
  .state-msg svg { width: 36px; height: 36px; fill: var(--border); display: block; margin: 0 auto .75rem; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; margin: 0 auto; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Modal for full cell content */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 500; display: none; align-items: center; justify-content: center; padding: 1.5rem; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; max-width: 700px; width: 100%; max-height: 80vh; display: flex; flex-direction: column; gap: 1rem; }
  .modal h3 { font-size: .95rem; font-weight: 600; }
  .modal pre { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; font-size: .78rem; overflow: auto; flex: 1; color: var(--text); white-space: pre-wrap; word-break: break-all; }
  .modal-close { background: none; border: 1px solid var(--border); color: var(--muted); padding: .4rem .9rem; border-radius: 7px; cursor: pointer; font-size: .82rem; align-self: flex-end; }
  .modal-close:hover { border-color: var(--danger); color: var(--danger); }

  /* Stats bar */
  .stats-bar { display: flex; gap: 1rem; margin-bottom: 1rem; flex-wrap: wrap; }
  .stat-pill { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: .5rem .9rem; font-size: .8rem; display: flex; align-items: center; gap: .5rem; }
  .stat-pill strong { color: var(--accent); font-size: 1rem; }
</style>
</head>
<body>

<nav>
  <a class="nav-brand" href="/admin">
    <svg viewBox="0 0 24 24"><path d="M20 13H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1v-6c0-.55-.45-1-1-1zm-2 5h-2v-2h2v2zm0-10H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1V8c0-.55-.45-1-1-1zm-2 5h-2V9h2v2zM4 6h16V4H4v2z"/></svg>
    DB Viewer
  </a>
  <div class="nav-links">
    <a href="/">Scan</a>
    <a href="/history">History</a>
    <a href="/analytics">Analytics</a>
    <a href="/admin">Admin</a>
  </div>
  <button class="btn-logout" onclick="logout()">Logout</button>
</nav>

<main>
  <!-- Sidebar: table list -->
  <aside class="sidebar">
    <div class="sidebar-title">Tables</div>
    <div id="tableList"><div style="padding:.75rem"><div class="spinner"></div></div></div>
    <hr class="sidebar-sep">
    <div style="padding:.5rem .75rem;font-size:.75rem;color:var(--muted);line-height:1.6">
      Password hash disembunyikan.<br>
      scan_details dipotong 300 char.<br>
      Read-only — tidak bisa edit.
    </div>
  </aside>

  <!-- Main content -->
  <div class="content">
    <div id="welcomeState" class="state-msg">
      <svg viewBox="0 0 24 24"><path d="M20 13H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1v-6c0-.55-.45-1-1-1zm-2 5h-2v-2h2v2zm0-10H4c-.55 0-1 .45-1 1v6c0 .55.45 1 1 1h16c.55 0 1-.45 1-1V8c0-.55-.45-1-1-1zm-2 5h-2V9h2v2zM4 6h16V4H4v2z"/></svg>
      Pilih tabel dari sidebar untuk melihat data
    </div>

    <div id="tableView" style="display:none">
      <div class="content-header">
        <h2>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="var(--accent)" style="flex-shrink:0"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>
          <span id="tableTitle">—</span>
          <span class="badge-table" id="tableBadge"></span>
        </h2>
        <div class="actions">
          <input class="search-input" id="searchInput" type="text" placeholder="Filter baris..." oninput="filterRows()">
          <button class="btn btn-export" onclick="exportCSV()">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            Export CSV
          </button>
          <button class="btn btn-outline" onclick="refreshTable()">
            <svg viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
            Refresh
          </button>
        </div>
      </div>

      <div class="stats-bar" id="statsBar"></div>

      <div class="table-wrap">
        <div class="table-scroll">
          <table id="dataTable">
            <thead id="tableHead"></thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div class="pagination" id="pagination"></div>
      </div>
    </div>
  </div>
</main>

<!-- Cell content modal -->
<div class="modal-bg" id="cellModal">
  <div class="modal">
    <h3 id="modalTitle">Cell content</h3>
    <pre id="modalContent"></pre>
    <button class="modal-close" onclick="closeModal()">Tutup</button>
  </div>
</div>

<script>
  let currentTable  = null;
  let currentOffset = 0;
  let currentLimit  = 50;
  let currentTotal  = 0;
  let allRows       = [];
  let sortCol       = null;
  let sortDir       = 1;

  async function logout() {
    await fetch('/api/auth/logout', { method: 'POST' });
    window.location.href = '/login';
  }

  // ── Load table list ────────────────────────────────────────────────────────
  async function loadTableList() {
    const res  = await fetch('/api/admin/db/tables');
    const data = await res.json();
    const list = document.getElementById('tableList');
    const ICONS = {
      users: '👤', sessions: '🔑', scan_history: '🔍',
      scan_details: '📄', username_cache: '💾', api_usage_log: '⚡',
    };
    list.innerHTML = data.map(t => `
      <button class="table-btn" id="btn-${t.table}" onclick="loadTable('${t.table}')">
        <span>${ICONS[t.table] || '🗂'} ${t.table}</span>
        <span class="count">${t.rows.toLocaleString()}</span>
      </button>
    `).join('');
  }

  // ── Load table data ────────────────────────────────────────────────────────
  async function loadTable(table, offset = 0) {
    currentTable  = table;
    currentOffset = offset;

    document.getElementById('welcomeState').style.display = 'none';
    document.getElementById('tableView').style.display    = 'block';
    document.getElementById('tableTitle').textContent      = table;
    document.getElementById('tableBadge').textContent      = table;
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="99" style="text-align:center;padding:3rem"><div class="spinner"></div></td></tr>';
    document.getElementById('statsBar').innerHTML   = '';
    document.getElementById('pagination').innerHTML = '';

    document.querySelectorAll('.table-btn').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById(`btn-${table}`);
    if (btn) btn.classList.add('active');

    const res  = await fetch(`/api/admin/db/query?table=${table}&limit=${currentLimit}&offset=${offset}`);
    const data = await res.json();

    currentTotal = data.total;
    allRows      = data.rows;

    renderHead(data.columns);
    renderRows(data.rows);
    renderPagination();
    renderStats(table, data);
    document.getElementById('searchInput').value = '';
  }

  function renderHead(cols) {
    document.getElementById('tableHead').innerHTML =
      '<tr>' + cols.map(c => `
        <th onclick="sortBy('${c}')" class="${sortCol===c?'sorted':''}">
          ${c}${sortCol===c ? (sortDir>0?' ↑':' ↓') : ''}
        </th>`).join('') + '</tr>';
  }

  function renderRows(rows) {
    const body = document.getElementById('tableBody');
    if (!rows.length) {
      body.innerHTML = '<tr><td colspan="99" class="state-msg" style="padding:3rem">Tidak ada data</td></tr>';
      return;
    }
    const cols = Object.keys(rows[0]);
    body.innerHTML = rows.map(row => `
      <tr>${cols.map(c => {
        const v = row[c];
        if (v === null || v === undefined) return `<td><span class="cell-null">NULL</span></td>`;
        if (c === 'password_hash') return `<td><span class="cell-null">••••••••••••</span></td>`;
        if (c === 'risk_level' && v)  return `<td><span class="badge badge-${v}">${v}</span></td>`;
        if (c === 'role' && v)        return `<td><span class="badge badge-${v}">${v}</span></td>`;
        if (c === 'is_active' || c === 'success')
          return `<td><span class="badge badge-${v}">${v?'✓':'✗'}</span></td>`;
        const s = String(v);
        if (s.length > 80)
          return `<td><span class="cell-long" title="Klik untuk lihat lengkap" onclick="showCell('${esc(c)}','${esc(s)}')">${esc(s.slice(0,80))}…</span></td>`;
        return `<td>${esc(s)}</td>`;
      }).join('')}</tr>`).join('');
  }

  function renderPagination() {
    const pages = Math.ceil(currentTotal / currentLimit);
    const cur   = Math.floor(currentOffset / currentLimit) + 1;
    document.getElementById('pagination').innerHTML = `
      <span>Menampilkan ${currentOffset + 1}–${Math.min(currentOffset + currentLimit, currentTotal)} dari ${currentTotal.toLocaleString()} baris</span>
      <div class="pag-btns">
        <button class="pag-btn" onclick="loadTable(currentTable, 0)" ${cur===1?'disabled':''}>«</button>
        <button class="pag-btn" onclick="loadTable(currentTable, ${currentOffset - currentLimit})" ${cur===1?'disabled':''}>‹ Prev</button>
        <span style="padding:.3rem .65rem;font-size:.8rem;color:var(--muted)">Hal ${cur} / ${pages}</span>
        <button class="pag-btn" onclick="loadTable(currentTable, ${currentOffset + currentLimit})" ${cur===pages?'disabled':''}>Next ›</button>
        <button class="pag-btn" onclick="loadTable(currentTable, ${(pages-1)*currentLimit})" ${cur===pages?'disabled':''}>»</button>
      </div>`;
  }

  function renderStats(table, data) {
    const bar = document.getElementById('statsBar');
    if (table === 'users') {
      const admins  = data.rows.filter(r => r.role === 'admin').length;
      const active  = data.rows.filter(r => r.is_active).length;
      bar.innerHTML = `
        <div class="stat-pill">Total <strong>${data.total}</strong> user</div>
        <div class="stat-pill">Admin <strong>${admins}</strong></div>
        <div class="stat-pill">Aktif <strong>${active}</strong></div>`;
    } else if (table === 'scan_history') {
      const high = data.rows.filter(r => r.risk_level === 'HIGH').length;
      const avg  = data.rows.length
        ? Math.round(data.rows.reduce((s,r) => s + (r.exposure_score||0), 0) / data.rows.length)
        : 0;
      bar.innerHTML = `
        <div class="stat-pill">Total <strong>${data.total}</strong> scan</div>
        <div class="stat-pill">High Risk <strong style="color:var(--danger)">${high}</strong></div>
        <div class="stat-pill">Avg Score <strong>${avg}</strong>/100</div>`;
    } else if (table === 'api_usage_log') {
      const ok  = data.rows.filter(r => r.success).length;
      const pct = data.rows.length ? Math.round(ok / data.rows.length * 100) : 0;
      bar.innerHTML = `
        <div class="stat-pill">Total calls <strong>${data.total}</strong></div>
        <div class="stat-pill">Success rate <strong style="color:var(--success)">${pct}%</strong></div>`;
    }
  }

  function filterRows() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    if (!q) { renderRows(allRows); return; }
    const filtered = allRows.filter(r =>
      Object.values(r).some(v => v && String(v).toLowerCase().includes(q))
    );
    renderRows(filtered);
  }

  function sortBy(col) {
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    const sorted = [...allRows].sort((a, b) => {
      const av = a[col], bv = b[col];
      if (av === null) return 1;
      if (bv === null) return -1;
      return String(av).localeCompare(String(bv), undefined, {numeric: true}) * sortDir;
    });
    const cols = allRows.length ? Object.keys(allRows[0]) : [];
    renderHead(cols);
    renderRows(sorted);
  }

  function refreshTable() {
    if (currentTable) loadTable(currentTable, currentOffset);
  }

  function exportCSV() {
    if (!currentTable) return;
    window.location.href = `/api/admin/db/export/${currentTable}`;
  }

  function showCell(col, content) {
    document.getElementById('modalTitle').textContent = col;
    let pretty = content;
    try { pretty = JSON.stringify(JSON.parse(content), null, 2); } catch {}
    document.getElementById('modalContent').textContent = pretty;
    document.getElementById('cellModal').classList.add('open');
  }
  function closeModal() {
    document.getElementById('cellModal').classList.remove('open');
  }
  document.getElementById('cellModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
  });

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  loadTableList();
</script>
</body>
</html>
